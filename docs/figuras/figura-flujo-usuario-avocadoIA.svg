<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1040 1780" width="1040" height="1780" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif" role="img" aria-label="Diagrama de flujo del usuario end-to-end en el prototipo Avocado IA">
  <defs>
    <marker id="fl" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#22312A"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1040" height="1780" fill="#FFFFFF"/>

  <!-- Título -->
  <text x="40" y="44" font-size="19" font-weight="700" fill="#22312A">Flujo de usuario end-to-end — Avocado IA</text>
  <text x="40" y="66" font-size="12" fill="#5A6B60">Detección on-device de enfermedades del aguacate</text>

  <!-- Leyenda -->
  <rect x="720" y="20" width="284" height="152" rx="8" fill="#FFFFFF" stroke="#C7D4CB"/>
  <text x="742" y="44" font-size="10.5" font-weight="700" letter-spacing="1.5" fill="#5A6B60">LEYENDA</text>
  <rect x="742" y="56" width="36" height="20" rx="10" fill="#1F6B3B"/>
  <text x="790" y="71" font-size="12" fill="#22312A">Inicio / Fin</text>
  <rect x="742" y="84" width="36" height="20" fill="#EAF1FA" stroke="#9FB9DC"/>
  <text x="790" y="99" font-size="12" fill="#22312A">Proceso</text>
  <polygon points="760,110 778,121 760,132 742,121" fill="#FFF6DC" stroke="#DEC26E"/>
  <text x="790" y="126" font-size="12" fill="#22312A">Decisión</text>
  <rect x="742" y="140" width="17" height="20" fill="#E8F2EB" stroke="#7FB894"/>
  <rect x="761" y="140" width="17" height="20" fill="#FBEAEA" stroke="#DE9B9B"/>
  <text x="790" y="155" font-size="12" fill="#22312A">Resultado (sano / enfermedad)</text>

  <!-- INICIO -->
  <rect x="430" y="38" width="140" height="44" rx="22" fill="#1F6B3B"/>
  <text x="500" y="66" font-size="13.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">INICIO</text>
  <line x1="500" y1="82" x2="500" y2="106" stroke="#22312A" stroke-width="1.8" marker-end="url(#fl)"/>

  <!-- Abre la app -->
  <rect x="340" y="112" width="320" height="44" rx="6" fill="#EAF1FA" stroke="#9FB9DC"/>
  <text x="500" y="139" font-size="12.5" fill="#22312A" text-anchor="middle">El usuario abre la aplicación</text>
  <line x1="500" y1="156" x2="500" y2="180" stroke="#22312A" stroke-width="1.8" marker-end="url(#fl)"/>

  <!-- ¿Primer uso? -->
  <polygon points="500,186 630,236 500,286 370,236" fill="#FFF6DC" stroke="#DEC26E" stroke-width="1.2"/>
  <text x="500" y="232" font-size="12" fill="#22312A" text-anchor="middle">¿Primer uso</text>
  <text x="500" y="250" font-size="12" fill="#22312A" text-anchor="middle">de la app?</text>
  <line x1="630" y1="236" x2="662" y2="236" stroke="#22312A" stroke-width="1.8" marker-end="url(#fl)"/>
  <text x="640" y="226" font-size="12" font-weight="600" fill="#5A6B60">Sí</text>
  <text x="512" y="308" font-size="12" font-weight="600" fill="#5A6B60">No</text>

  <rect x="668" y="210" width="252" height="52" rx="6" fill="#EAF1FA" stroke="#9FB9DC"/>
  <text x="794" y="232" font-size="12.5" fill="#22312A" text-anchor="middle">Onboarding</text>
  <text x="794" y="250" font-size="11.5" fill="#5A6B60" text-anchor="middle">(3 pantallas de introducción)</text>
  <polyline points="794,262 794,310 500,310" fill="none" stroke="#22312A" stroke-width="1.8"/>
  <line x1="500" y1="286" x2="500" y2="330" stroke="#22312A" stroke-width="1.8" marker-end="url(#fl)"/>

  <!-- Panel de control -->
  <rect x="340" y="336" width="320" height="44" rx="6" fill="#EAF1FA" stroke="#9FB9DC"/>
  <text x="500" y="363" font-size="12.5" fill="#22312A" text-anchor="middle">Pantalla principal (Panel de Control)</text>
  <line x1="500" y1="380" x2="500" y2="404" stroke="#22312A" stroke-width="1.8" marker-end="url(#fl)"/>

  <!-- Pestaña cámara + carga modelo -->
  <rect x="340" y="410" width="320" height="60" rx="6" fill="#EAF1FA" stroke="#9FB9DC"/>
  <text x="500" y="435" font-size="12.5" fill="#22312A" text-anchor="middle">Abre la pestaña Cámara —</text>
  <text x="500" y="455" font-size="11.5" fill="#5A6B60" text-anchor="middle">se carga el modelo CNN (.tflite)</text>
  <line x1="500" y1="470" x2="500" y2="494" stroke="#22312A" stroke-width="1.8" marker-end="url(#fl)"/>

  <!-- ¿Origen de la imagen? -->
  <polygon points="500,500 640,550 500,600 360,550" fill="#FFF6DC" stroke="#DEC26E" stroke-width="1.2"/>
  <text x="500" y="546" font-size="12" fill="#22312A" text-anchor="middle">¿Origen de</text>
  <text x="500" y="564" font-size="12" fill="#22312A" text-anchor="middle">la imagen?</text>
  <line x1="360" y1="550" x2="298" y2="550" stroke="#22312A" stroke-width="1.8" marker-end="url(#fl)"/>
  <text x="330" y="572" font-size="12" font-weight="600" fill="#5A6B60" text-anchor="middle">Cámara</text>
  <line x1="640" y1="550" x2="700" y2="550" stroke="#22312A" stroke-width="1.8" marker-end="url(#fl)"/>
  <text x="670" y="572" font-size="12" font-weight="600" fill="#5A6B60" text-anchor="middle">Galería</text>

  <rect x="70" y="522" width="220" height="56" rx="6" fill="#EAF1FA" stroke="#9FB9DC"/>
  <text x="180" y="546" font-size="12.5" fill="#22312A" text-anchor="middle">Tomar foto</text>
  <text x="180" y="565" font-size="11.5" fill="#5A6B60" text-anchor="middle">(cámara del dispositivo)</text>
  <polyline points="180,578 180,618 500,618" fill="none" stroke="#22312A" stroke-width="1.8"/>

  <rect x="706" y="522" width="220" height="56" rx="6" fill="#EAF1FA" stroke="#9FB9DC"/>
  <text x="816" y="546" font-size="12.5" fill="#22312A" text-anchor="middle">Elegir de galería</text>
  <text x="816" y="565" font-size="11.5" fill="#5A6B60" text-anchor="middle">(image_picker)</text>
  <polyline points="816,578 816,618 500,618" fill="none" stroke="#22312A" stroke-width="1.8"/>

  <line x1="500" y1="618" x2="500" y2="634" stroke="#22312A" stroke-width="1.8" marker-end="url(#fl)"/>

  <!-- Vista previa -->
  <rect x="340" y="640" width="320" height="44" rx="6" fill="#EAF1FA" stroke="#9FB9DC"/>
  <text x="500" y="667" font-size="12.5" fill="#22312A" text-anchor="middle">Vista previa de la imagen seleccionada</text>
  <line x1="500" y1="684" x2="500" y2="704" stroke="#22312A" stroke-width="1.8" marker-end="url(#fl)"/>

  <!-- Analizar -->
  <rect x="340" y="710" width="320" height="44" rx="6" fill="#EAF1FA" stroke="#9FB9DC"/>
  <text x="500" y="737" font-size="12.5" fill="#22312A" text-anchor="middle">Pulsa el botón "Analizar Imagen"</text>
  <line x1="500" y1="754" x2="500" y2="778" stroke="#22312A" stroke-width="1.8" marker-end="url(#fl)"/>

  <!-- Preprocesamiento -->
  <rect x="340" y="784" width="320" height="72" rx="6" fill="#EAF1FA" stroke="#9FB9DC"/>
  <text x="500" y="808" font-size="12.5" fill="#22312A" text-anchor="middle">Preprocesamiento de la imagen</text>
  <text x="500" y="827" font-size="11.5" fill="#5A6B60" text-anchor="middle">rotación EXIF · redimensión 224 × 224 px</text>
  <text x="500" y="845" font-size="11.5" fill="#5A6B60" text-anchor="middle">RGB normalizado [0, 1]</text>
  <line x1="500" y1="856" x2="500" y2="880" stroke="#22312A" stroke-width="1.8" marker-end="url(#fl)"/>

  <!-- Inferencia -->
  <rect x="340" y="886" width="320" height="48" rx="6" fill="#EAF1FA" stroke="#9FB9DC"/>
  <text x="500" y="907" font-size="12.5" fill="#22312A" text-anchor="middle">Inferencia on-device</text>
  <text x="500" y="926" font-size="11.5" fill="#5A6B60" text-anchor="middle">CNN MobileNetV2 — TensorFlow Lite</text>
  <line x1="500" y1="934" x2="500" y2="958" stroke="#22312A" stroke-width="1.8" marker-end="url(#fl)"/>

  <!-- Softmax -->
  <rect x="340" y="964" width="320" height="44" rx="6" fill="#EAF1FA" stroke="#9FB9DC"/>
  <text x="500" y="991" font-size="12.5" fill="#22312A" text-anchor="middle">Probabilidades softmax de las 3 clases</text>
  <line x1="500" y1="1008" x2="500" y2="1032" stroke="#22312A" stroke-width="1.8" marker-end="url(#fl)"/>

  <!-- ¿Sano? -->
  <polygon points="500,1038 645,1090 500,1142 355,1090" fill="#FFF6DC" stroke="#DEC26E" stroke-width="1.2"/>
  <text x="500" y="1086" font-size="11.5" fill="#22312A" text-anchor="middle">¿La clase con mayor</text>
  <text x="500" y="1104" font-size="11.5" fill="#22312A" text-anchor="middle">probabilidad es "sano"?</text>
  <line x1="355" y1="1090" x2="328" y2="1090" stroke="#22312A" stroke-width="1.8" marker-end="url(#fl)"/>
  <text x="348" y="1080" font-size="12" font-weight="600" fill="#5A6B60" text-anchor="end">Sí</text>
  <line x1="645" y1="1090" x2="666" y2="1090" stroke="#22312A" stroke-width="1.8" marker-end="url(#fl)"/>
  <text x="652" y="1080" font-size="12" font-weight="600" fill="#5A6B60">No</text>

  <rect x="70" y="1058" width="252" height="64" rx="6" fill="#E8F2EB" stroke="#7FB894"/>
  <text x="196" y="1080" font-size="12.5" font-weight="600" fill="#1F6B3B" text-anchor="middle">Fruto sano</text>
  <text x="196" y="1098" font-size="11.5" fill="#5A6B60" text-anchor="middle">Continuar con las prácticas</text>
  <text x="196" y="1114" font-size="11.5" fill="#5A6B60" text-anchor="middle">de manejo actuales</text>
  <polyline points="196,1122 196,1162 500,1162" fill="none" stroke="#22312A" stroke-width="1.8"/>

  <rect x="672" y="1054" width="262" height="72" rx="6" fill="#FBEAEA" stroke="#DE9B9B"/>
  <text x="803" y="1078" font-size="12.5" font-weight="600" fill="#B03A3A" text-anchor="middle">Mancha negra / Roña</text>
  <text x="803" y="1096" font-size="11.5" fill="#5A6B60" text-anchor="middle">Recomendaciones de</text>
  <text x="803" y="1112" font-size="11.5" fill="#5A6B60" text-anchor="middle">tratamiento fungicida</text>
  <polyline points="803,1126 803,1162 500,1162" fill="none" stroke="#22312A" stroke-width="1.8"/>

  <line x1="500" y1="1162" x2="500" y2="1178" stroke="#22312A" stroke-width="1.8" marker-end="url(#fl)"/>

  <!-- SQLite -->
  <rect x="340" y="1184" width="320" height="48" rx="6" fill="#EAF1FA" stroke="#9FB9DC"/>
  <text x="500" y="1205" font-size="12.5" fill="#22312A" text-anchor="middle">Guarda la detección en SQLite</text>
  <text x="500" y="1224" font-size="11.5" fill="#5A6B60" text-anchor="middle">(clase, confianza, imagen, workspace)</text>
  <line x1="500" y1="1232" x2="500" y2="1256" stroke="#22312A" stroke-width="1.8" marker-end="url(#fl)"/>

  <!-- Diálogo -->
  <rect x="340" y="1262" width="320" height="48" rx="6" fill="#EAF1FA" stroke="#9FB9DC"/>
  <text x="500" y="1283" font-size="12.5" fill="#22312A" text-anchor="middle">Muestra el diálogo de resultado</text>
  <text x="500" y="1302" font-size="11.5" fill="#5A6B60" text-anchor="middle">clase + confianza + recomendaciones</text>
  <line x1="500" y1="1310" x2="500" y2="1334" stroke="#22312A" stroke-width="1.8" marker-end="url(#fl)"/>

  <!-- ¿Asistente? -->
  <polygon points="500,1340 640,1392 500,1444 360,1392" fill="#FFF6DC" stroke="#DEC26E" stroke-width="1.2"/>
  <text x="500" y="1388" font-size="12" fill="#22312A" text-anchor="middle">¿Consultar al</text>
  <text x="500" y="1406" font-size="12" fill="#22312A" text-anchor="middle">asistente de IA?</text>
  <line x1="640" y1="1392" x2="666" y2="1392" stroke="#22312A" stroke-width="1.8" marker-end="url(#fl)"/>
  <text x="648" y="1382" font-size="12" font-weight="600" fill="#5A6B60">Sí</text>
  <text x="516" y="1478" font-size="12" font-weight="600" fill="#5A6B60">No</text>

  <rect x="672" y="1364" width="262" height="56" rx="6" fill="#EAF1FA" stroke="#9FB9DC"/>
  <text x="803" y="1388" font-size="12.5" fill="#22312A" text-anchor="middle">Chat con Gemma 3 (on-device)</text>
  <text x="803" y="1407" font-size="11.5" fill="#5A6B60" text-anchor="middle">con el contexto de la detección</text>
  <polyline points="803,1420 803,1460 500,1460" fill="none" stroke="#22312A" stroke-width="1.8"/>
  <line x1="500" y1="1444" x2="500" y2="1474" stroke="#22312A" stroke-width="1.8" marker-end="url(#fl)"/>

  <!-- ¿Otro análisis? -->
  <polygon points="500,1480 640,1532 500,1584 360,1532" fill="#FFF6DC" stroke="#DEC26E" stroke-width="1.2"/>
  <text x="500" y="1528" font-size="12" fill="#22312A" text-anchor="middle">¿Realizar otro</text>
  <text x="500" y="1546" font-size="12" fill="#22312A" text-anchor="middle">análisis?</text>
  <polyline points="360,1532 45,1532 45,440 330,440" fill="none" stroke="#22312A" stroke-width="1.8"/>
  <line x1="326" y1="440" x2="334" y2="440" stroke="#22312A" stroke-width="1.8" marker-end="url(#fl)"/>
  <text x="348" y="1522" font-size="12" font-weight="600" fill="#5A6B60" text-anchor="end">Sí</text>
  <line x1="500" y1="1584" x2="500" y2="1602" stroke="#22312A" stroke-width="1.8" marker-end="url(#fl)"/>
  <text x="512" y="1600" font-size="12" font-weight="600" fill="#5A6B60">No</text>

  <!-- Dashboard -->
  <rect x="340" y="1608" width="320" height="48" rx="6" fill="#EAF1FA" stroke="#9FB9DC"/>
  <text x="500" y="1629" font-size="12.5" fill="#22312A" text-anchor="middle">Dashboard e historial actualizados</text>
  <text x="500" y="1648" font-size="11.5" fill="#5A6B60" text-anchor="middle">(estadísticas por clase)</text>
  <line x1="500" y1="1656" x2="500" y2="1678" stroke="#22312A" stroke-width="1.8" marker-end="url(#fl)"/>

  <!-- FIN -->
  <rect x="440" y="1684" width="120" height="44" rx="22" fill="#1F6B3B"/>
  <text x="500" y="1712" font-size="13.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">FIN</text>
</svg>
