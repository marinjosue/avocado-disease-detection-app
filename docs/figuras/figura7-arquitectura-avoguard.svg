<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1240 900" width="1240" height="900" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif" role="img" aria-label="Arquitectura en tres capas del sistema Avoguard">
  <defs>
    <marker id="flecha" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#22312A"/>
    </marker>
    <marker id="flechaGris" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#7A8B80"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1240" height="900" fill="#FFFFFF"/>

  <text x="40" y="42" font-size="21" font-weight="700" fill="#22312A">Arquitectura general del sistema Avoguard</text>
  <rect x="950" y="20" width="250" height="30" rx="15" fill="#E8F2EB"/>
  <text x="1075" y="40" font-size="12.5" font-weight="600" fill="#1F6B3B" text-anchor="middle">Ejecución 100 % local · sin nube</text>

  <!-- CAPA 1: PRESENTACIÓN -->
  <rect x="40" y="72" width="1160" height="212" rx="10" fill="#F6FAF7" stroke="#B9CDC0" stroke-width="1.5"/>
  <text x="70" y="102" font-size="13" font-weight="700" letter-spacing="1.5" fill="#1F6B3B">CAPA DE PRESENTACIÓN</text>
  <text x="1170" y="102" font-size="12.5" fill="#5A6B60" text-anchor="end">Flutter · Dart · Material 3</text>

  <g stroke="#C7D4CB" stroke-width="1" fill="#FFFFFF">
    <rect x="70"  y="118" width="173" height="64" rx="7"/>
    <rect x="255" y="118" width="173" height="64" rx="7"/>
    <rect x="440" y="118" width="173" height="64" rx="7"/>
    <rect x="625" y="118" width="173" height="64" rx="7"/>
    <rect x="810" y="118" width="173" height="64" rx="7"/>
    <rect x="995" y="118" width="173" height="64" rx="7"/>
  </g>
  <g font-size="14.5" font-weight="600" fill="#22312A" text-anchor="middle">
    <text x="156.5"  y="146">Dashboard</text>
    <text x="341.5"  y="146">Calculadora</text>
    <text x="526.5"  y="146">Detección</text>
    <text x="711.5"  y="146">Historial</text>
    <text x="896.5"  y="146">Asistente IA</text>
    <text x="1081.5" y="146">Ajustes</text>
  </g>
  <g font-size="11.5" fill="#5A6B60" text-anchor="middle">
    <text x="156.5"  y="166">Estadísticas (fl_chart)</text>
    <text x="341.5"  y="166">Cálculo de tratamiento</text>
    <text x="526.5"  y="166">Cámara / galería</text>
    <text x="711.5"  y="166">Detecciones previas</text>
    <text x="896.5"  y="166">Chat + voz</text>
    <text x="1081.5" y="166">Idioma / tema</text>
  </g>

  <rect x="70" y="200" width="660" height="60" rx="7" fill="#FFFFFF" stroke="#C7D4CB"/>
  <text x="400" y="224" font-size="13.5" font-weight="600" fill="#22312A" text-anchor="middle">Gestión de estado (Provider)</text>
  <text x="400" y="244" font-size="12" fill="#5A6B60" text-anchor="middle">DetectionProvider · AssistantProvider · LocaleProvider · ConnectivityProvider</text>

  <rect x="750" y="200" width="418" height="60" rx="7" fill="#FFFFFF" stroke="#C7D4CB"/>
  <text x="959" y="224" font-size="13.5" font-weight="600" fill="#22312A" text-anchor="middle">Internacionalización (ARB)</text>
  <text x="959" y="244" font-size="12" fill="#5A6B60" text-anchor="middle">Español (predeterminado) · Inglés</text>

  <line x1="400" y1="294" x2="400" y2="374" stroke="#22312A" stroke-width="2" marker-end="url(#flecha)"/>
  <text x="412" y="340" font-size="12.5" fill="#5A6B60">Imagen capturada</text>
  <line x1="840" y1="376" x2="840" y2="296" stroke="#22312A" stroke-width="2" marker-end="url(#flecha)"/>
  <text x="852" y="340" font-size="12.5" fill="#5A6B60">Resultado de la clasificación</text>

  <!-- CAPA 2: PROCESAMIENTO LOCAL -->
  <rect x="40" y="382" width="1160" height="240" rx="10" fill="#F1F7F3" stroke="#B9CDC0" stroke-width="1.5"/>
  <text x="70" y="412" font-size="13" font-weight="700" letter-spacing="1.5" fill="#1F6B3B">CAPA DE PROCESAMIENTO LOCAL</text>
  <text x="1170" y="412" font-size="12.5" fill="#5A6B60" text-anchor="end">Inferencia on-device</text>

  <text x="70" y="448" font-size="11.5" font-weight="700" letter-spacing="1" fill="#5A6B60">DETECCIÓN DE ENFERMEDADES (CNN)</text>
  <text x="816" y="448" font-size="11.5" font-weight="700" letter-spacing="1" fill="#5A6B60">ASISTENTE IA</text>

  <rect x="70" y="460" width="220" height="88" rx="7" fill="#FFFFFF" stroke="#C7D4CB"/>
  <text x="180" y="490" font-size="14" font-weight="600" fill="#22312A" text-anchor="middle">Preprocesamiento</text>
  <text x="180" y="510" font-size="12" fill="#5A6B60" text-anchor="middle">Redimensión 224 × 224 px</text>
  <text x="180" y="528" font-size="12" fill="#5A6B60" text-anchor="middle">RGB normalizado [0, 1]</text>

  <line x1="292" y1="504" x2="312" y2="504" stroke="#22312A" stroke-width="2" marker-end="url(#flecha)"/>

  <rect x="318" y="460" width="220" height="88" rx="7" fill="#1F6B3B"/>
  <text x="428" y="490" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">Modelo CNN</text>
  <text x="428" y="510" font-size="12" fill="#DCEBE1" text-anchor="middle">TensorFlow Lite</text>
  <text x="428" y="528" font-size="12" fill="#DCEBE1" text-anchor="middle">(.tflite)</text>

  <line x1="540" y1="504" x2="560" y2="504" stroke="#22312A" stroke-width="2" marker-end="url(#flecha)"/>

  <rect x="566" y="460" width="220" height="88" rx="7" fill="#FFFFFF" stroke="#C7D4CB"/>
  <text x="676" y="490" font-size="14" font-weight="600" fill="#22312A" text-anchor="middle">Clasificación</text>
  <text x="676" y="510" font-size="12" fill="#5A6B60" text-anchor="middle">Sana · Mancha negra · Roña</text>
  <text x="676" y="528" font-size="12" fill="#5A6B60" text-anchor="middle">+ nivel de confianza</text>

  <rect x="816" y="460" width="354" height="40" rx="7" fill="#FFFFFF" stroke="#C7D4CB"/>
  <text x="993" y="485" font-size="12.5" font-weight="600" fill="#22312A" text-anchor="middle">Gemma 3 1B-IT · LiteRT-LM (chat)</text>
  <rect x="816" y="508" width="354" height="40" rx="7" fill="#FFFFFF" stroke="#C7D4CB"/>
  <text x="993" y="533" font-size="12.5" font-weight="600" fill="#22312A" text-anchor="middle">Voz: STT (sherpa-onnx) · TTS</text>

  <text x="70" y="596" font-size="11.5" font-style="italic" fill="#5A6B60">Toda la inferencia se ejecuta en el dispositivo (CPU/GPU); no se requiere conexión a internet.</text>

  <line x1="400" y1="628" x2="400" y2="684" stroke="#22312A" stroke-width="2" marker-end="url(#flecha)"/>
  <text x="412" y="660" font-size="12.5" fill="#5A6B60">Registro de detecciones</text>
  <line x1="840" y1="686" x2="840" y2="630" stroke="#22312A" stroke-width="2" marker-end="url(#flecha)"/>
  <text x="852" y="660" font-size="12.5" fill="#5A6B60">Historial y estadísticas</text>
  <line x1="1080" y1="688" x2="1080" y2="632" stroke="#7A8B80" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#flechaGris)"/>
  <text x="1092" y="644" font-size="11.5" fill="#7A8B80">Carga de modelos</text>

  <!-- CAPA 3: PERSISTENCIA -->
  <rect x="40" y="692" width="1160" height="170" rx="10" fill="#F4F6F5" stroke="#B9CDC0" stroke-width="1.5"/>
  <text x="70" y="722" font-size="13" font-weight="700" letter-spacing="1.5" fill="#1F6B3B">CAPA DE PERSISTENCIA</text>
  <text x="1170" y="722" font-size="12.5" fill="#5A6B60" text-anchor="end">Almacenamiento local</text>

  <rect x="70" y="744" width="356" height="84" rx="7" fill="#FFFFFF" stroke="#C7D4CB"/>
  <text x="248" y="772" font-size="13.5" font-weight="600" fill="#22312A" text-anchor="middle">Base de datos SQLite (sqflite)</text>
  <text x="248" y="792" font-size="12" fill="#5A6B60" text-anchor="middle">avoscan.db — tablas:</text>
  <text x="248" y="810" font-size="12" fill="#5A6B60" text-anchor="middle">workspaces · detection_results</text>

  <rect x="442" y="744" width="356" height="84" rx="7" fill="#FFFFFF" stroke="#C7D4CB"/>
  <text x="620" y="772" font-size="13.5" font-weight="600" fill="#22312A" text-anchor="middle">SharedPreferences</text>
  <text x="620" y="792" font-size="12" fill="#5A6B60" text-anchor="middle">idioma · tema · onboarding</text>
  <text x="620" y="810" font-size="12" fill="#5A6B60" text-anchor="middle">acceso al asistente IA</text>

  <rect x="814" y="744" width="356" height="84" rx="7" fill="#FFFFFF" stroke="#C7D4CB"/>
  <text x="992" y="772" font-size="13.5" font-weight="600" fill="#22312A" text-anchor="middle">Modelos locales</text>
  <text x="992" y="792" font-size="12" fill="#5A6B60" text-anchor="middle">CNN .tflite (assets)</text>
  <text x="992" y="810" font-size="12" fill="#5A6B60" text-anchor="middle">Gemma .litertlm (descarga única)</text>
</svg>
