<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1240 750" width="1240" height="750" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif" role="img" aria-label="Arquitectura del modelo CNN MobileNetV2 para deteccion de enfermedades del aguacate">
  <defs>
    <marker id="ma" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#22312A"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1240" height="750" fill="#FFFFFF"/>

  <!-- Título -->
  <text x="40" y="42" font-size="19" font-weight="700" fill="#22312A">Arquitectura del modelo de clasificación — MobileNetV2 (Transfer Learning)</text>
  <text x="40" y="64" font-size="12" fill="#5A6B60">Entrada 224 × 224 × 3 · salida softmax de 3 clases · entrenado en Google Colab (TensorFlow 2.20)</text>

  <rect x="990" y="20" width="210" height="30" rx="15" fill="#E8F2EB"/>
  <text x="1095" y="40" font-size="12.5" font-weight="600" fill="#1F6B3B" text-anchor="middle">Exactitud en test: 96.23 %</text>

  <!-- =================== BLOQUE A: DATASET =================== -->
  <rect x="40" y="110" width="200" height="340" rx="10" fill="#FFFFFF" stroke="#C7D4CB" stroke-width="1.4"/>
  <circle cx="140" cy="150" r="22" fill="#E8F2EB"/>
  <g transform="translate(128,138)" stroke="#1F6B3B" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="3" width="18" height="18" rx="2"/>
    <circle cx="8.5" cy="8.5" r="1.5"/>
    <path d="M21 15l-5-5L5 21"/>
  </g>
  <text x="140" y="198" font-size="14" font-weight="700" fill="#22312A" text-anchor="middle">Dataset</text>
  <text x="140" y="218" font-size="11.5" fill="#5A6B60" text-anchor="middle">2 999 imágenes de fruto</text>

  <circle cx="66" cy="248" r="4" fill="#2E9E5B"/>
  <text x="80" y="252" font-size="11.5" fill="#22312A">Sana — 999</text>
  <circle cx="66" cy="274" r="4" fill="#7A8B99"/>
  <text x="80" y="278" font-size="11.5" fill="#22312A">Mancha negra — 1 000</text>
  <circle cx="66" cy="300" r="4" fill="#E0A63A"/>
  <text x="80" y="304" font-size="11.5" fill="#22312A">Roña — 1 000</text>

  <line x1="62" y1="330" x2="218" y2="330" stroke="#E3EAE5" stroke-width="1.2"/>
  <text x="140" y="356" font-size="12" font-weight="600" fill="#22312A" text-anchor="middle">Split estratificado</text>
  <text x="140" y="376" font-size="11.5" fill="#5A6B60" text-anchor="middle">70 % train · 15 % val · 15 % test</text>
  <text x="140" y="394" font-size="11.5" fill="#5A6B60" text-anchor="middle">(balanceado por clase)</text>

  <line x1="240" y1="280" x2="274" y2="280" stroke="#22312A" stroke-width="1.8" marker-end="url(#ma)"/>

  <!-- =================== BLOQUE B: PREPROCESAMIENTO =================== -->
  <rect x="280" y="110" width="200" height="340" rx="10" fill="#FFFFFF" stroke="#C7D4CB" stroke-width="1.4"/>
  <circle cx="380" cy="150" r="22" fill="#E8F2EB"/>
  <g transform="translate(368,138)" stroke="#1F6B3B" stroke-width="1.8" fill="none" stroke-linecap="round">
    <line x1="21" y1="4" x2="14" y2="4"/><line x1="10" y1="4" x2="3" y2="4"/>
    <line x1="21" y1="12" x2="12" y2="12"/><line x1="8" y1="12" x2="3" y2="12"/>
    <line x1="21" y1="20" x2="16" y2="20"/><line x1="12" y1="20" x2="3" y2="20"/>
    <line x1="14" y1="2" x2="14" y2="6"/><line x1="8" y1="10" x2="8" y2="14"/><line x1="16" y1="18" x2="16" y2="22"/>
  </g>
  <text x="380" y="198" font-size="14" font-weight="700" fill="#22312A" text-anchor="middle">Preprocesamiento</text>
  <text x="380" y="218" font-size="11.5" fill="#5A6B60" text-anchor="middle">redimensión 224 × 224 px</text>
  <text x="380" y="236" font-size="11.5" fill="#5A6B60" text-anchor="middle">RGB normalizado [0, 1]</text>

  <text x="380" y="272" font-size="12" font-weight="600" fill="#22312A" text-anchor="middle">Aumentación (solo train)</text>
  <text x="306" y="298" font-size="11.5" fill="#5A6B60">· rotación ± 45°</text>
  <text x="306" y="320" font-size="11.5" fill="#5A6B60">· volteo horizontal / vertical</text>
  <text x="306" y="342" font-size="11.5" fill="#5A6B60">· zoom y desplazamiento 20 %</text>
  <text x="306" y="364" font-size="11.5" fill="#5A6B60">· brillo 0.8 – 1.2</text>
  <text x="306" y="386" font-size="11.5" fill="#5A6B60">· shear 20 %</text>

  <line x1="480" y1="280" x2="500" y2="280" stroke="#22312A" stroke-width="1.8" marker-end="url(#ma)"/>

  <!-- =================== BLOQUE C: MOBILENETV2 =================== -->
  <rect x="505" y="110" width="280" height="340" rx="10" fill="#FFFFFF" stroke="#C7D4CB" stroke-width="1.4"/>
  <circle cx="645" cy="150" r="22" fill="#E8F2EB"/>
  <g transform="translate(633,138)" stroke="#1F6B3B" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="12 2 2 7 12 12 22 7 12 2"/>
    <polyline points="2 12 12 17 22 12"/>
    <polyline points="2 17 12 22 22 17"/>
  </g>
  <text x="645" y="198" font-size="14" font-weight="700" fill="#22312A" text-anchor="middle">MobileNetV2</text>
  <text x="645" y="218" font-size="11.5" fill="#5A6B60" text-anchor="middle">base convolucional · pesos ImageNet</text>

  <!-- mapas de características -->
  <rect x="547" y="242" width="16" height="120" rx="3" fill="#CFE6D8"/>
  <rect x="584" y="254" width="22" height="96"  rx="3" fill="#BBDCC9"/>
  <rect x="622" y="265" width="28" height="74"  rx="3" fill="#A7D2BA"/>
  <rect x="666" y="275" width="36" height="54"  rx="3" fill="#93C8AB"/>
  <rect x="716" y="282" width="50" height="40"  rx="3" fill="#1F6B3B"/>
  <g stroke="#8FAE9B" stroke-width="1.3">
    <line x1="565" y1="302" x2="582" y2="302"/>
    <line x1="608" y1="302" x2="620" y2="302"/>
    <line x1="652" y1="302" x2="664" y2="302"/>
    <line x1="704" y1="302" x2="714" y2="302"/>
  </g>
  <g font-size="10.5" fill="#5A6B60" text-anchor="middle">
    <text x="555" y="382">112²·32</text>
    <text x="595" y="382">56²·24</text>
    <text x="636" y="382">28²·32</text>
    <text x="684" y="382">14²·96</text>
    <text x="741" y="382">7²·1280</text>
  </g>
  <text x="645" y="410" font-size="11.5" fill="#5A6B60" text-anchor="middle">17 bloques bottleneck (conv. depthwise)</text>
  <text x="645" y="430" font-size="11.5" fill="#5A6B60" text-anchor="middle">2.26 M parámetros — congelada en Fase 1</text>

  <line x1="785" y1="280" x2="805" y2="280" stroke="#22312A" stroke-width="1.8" marker-end="url(#ma)"/>

  <!-- =================== BLOQUE D: CABEZA =================== -->
  <rect x="810" y="110" width="230" height="340" rx="10" fill="#FFFFFF" stroke="#C7D4CB" stroke-width="1.4"/>
  <circle cx="925" cy="150" r="22" fill="#E8F2EB"/>
  <g transform="translate(913,138)" stroke="#1F6B3B" stroke-width="1.8" fill="none" stroke-linecap="round">
    <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
    <line x1="8.6" y1="13.5" x2="15.4" y2="17.5"/>
    <line x1="15.4" y1="6.5" x2="8.6" y2="10.5"/>
  </g>
  <text x="925" y="198" font-size="14" font-weight="700" fill="#22312A" text-anchor="middle">Cabeza de clasificación</text>
  <text x="925" y="218" font-size="11.5" fill="#5A6B60" text-anchor="middle">entrenada desde cero</text>

  <rect x="835" y="240" width="180" height="24" rx="5" fill="#EAF1FA" stroke="#9FB9DC"/>
  <text x="925" y="256" font-size="11" fill="#22312A" text-anchor="middle">GlobalAveragePooling — 1280</text>
  <text x="925" y="280" font-size="10.5" fill="#8A9A90" text-anchor="middle">Dropout 0.30</text>

  <rect x="855" y="290" width="140" height="24" rx="5" fill="#EAF1FA" stroke="#9FB9DC"/>
  <text x="925" y="306" font-size="11" fill="#22312A" text-anchor="middle">Dense 512 · ReLU</text>
  <text x="925" y="330" font-size="10.5" fill="#8A9A90" text-anchor="middle">BatchNorm · Dropout 0.50</text>

  <rect x="868" y="340" width="114" height="24" rx="5" fill="#EAF1FA" stroke="#9FB9DC"/>
  <text x="925" y="356" font-size="11" fill="#22312A" text-anchor="middle">Dense 256 · ReLU</text>
  <text x="925" y="380" font-size="10.5" fill="#8A9A90" text-anchor="middle">BatchNorm · Dropout 0.40</text>

  <rect x="877" y="390" width="96" height="26" rx="5" fill="#1F6B3B"/>
  <text x="925" y="407" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Dense 3 · Softmax</text>

  <text x="925" y="438" font-size="11.5" fill="#5A6B60" text-anchor="middle">790 K parámetros entrenables</text>

  <line x1="1040" y1="280" x2="1060" y2="280" stroke="#22312A" stroke-width="1.8" marker-end="url(#ma)"/>

  <!-- =================== BLOQUE E: SALIDA =================== -->
  <rect x="1065" y="110" width="135" height="340" rx="10" fill="#FFFFFF" stroke="#C7D4CB" stroke-width="1.4"/>
  <circle cx="1132" cy="150" r="22" fill="#E8F2EB"/>
  <g transform="translate(1120,138)" stroke="#1F6B3B" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.5 19 2c1 2 2 4.2 2 8 0 5.5-4.8 10-10 10Z"/>
    <path d="M2 21c0-3 1.9-5.4 5.1-6C9.5 14.5 12 13 13 12"/>
  </g>
  <text x="1132" y="198" font-size="14" font-weight="700" fill="#22312A" text-anchor="middle">Salida</text>
  <text x="1132" y="218" font-size="11.5" fill="#5A6B60" text-anchor="middle">3 clases</text>

  <rect x="1077" y="244" width="110" height="30" rx="15" fill="#E8F2EB" stroke="#7FB894"/>
  <text x="1132" y="264" font-size="11.5" font-weight="600" fill="#1F6B3B" text-anchor="middle">Sana</text>
  <rect x="1077" y="286" width="110" height="30" rx="15" fill="#EEF1F4" stroke="#A9B4C0"/>
  <text x="1132" y="306" font-size="11.5" font-weight="600" fill="#4A5764" text-anchor="middle">Mancha negra</text>
  <rect x="1077" y="328" width="110" height="30" rx="15" fill="#FBF3E0" stroke="#DDB25E"/>
  <text x="1132" y="348" font-size="11.5" font-weight="600" fill="#8A6A1F" text-anchor="middle">Roña</text>

  <text x="1132" y="392" font-size="11" fill="#5A6B60" text-anchor="middle">probabilidades</text>
  <text x="1132" y="408" font-size="11" fill="#5A6B60" text-anchor="middle">softmax (Σ = 1)</text>

  <!-- =================== BANDA INFERIOR =================== -->
  <text x="40" y="502" font-size="12" font-weight="700" letter-spacing="1.5" fill="#1F6B3B">ENTRENAMIENTO Y DESPLIEGUE</text>

  <!-- Card 1: Fase 1 -->
  <rect x="40" y="520" width="270" height="185" rx="10" fill="#F6FAF7" stroke="#C7D4CB" stroke-width="1.4"/>
  <circle cx="80" cy="560" r="20" fill="#FFFFFF" stroke="#DCE7DF"/>
  <g transform="translate(69,549)" stroke="#1F6B3B" stroke-width="1.7" fill="none" stroke-linecap="round">
    <line x1="11" y1="2" x2="11" y2="20"/>
    <line x1="2" y1="11" x2="20" y2="11"/>
    <line x1="4.6" y1="4.6" x2="17.4" y2="17.4"/>
    <line x1="17.4" y1="4.6" x2="4.6" y2="17.4"/>
  </g>
  <text x="112" y="556" font-size="13" font-weight="700" fill="#22312A">Fase 1 — Transferencia</text>
  <text x="112" y="574" font-size="11.5" fill="#5A6B60">base congelada</text>
  <text x="64" y="612" font-size="11.5" fill="#5A6B60">· Adam, lr 1×10⁻⁴ · 30 épocas</text>
  <text x="64" y="634" font-size="11.5" fill="#5A6B60">· EarlyStopping · ReduceLROnPlateau</text>
  <text x="64" y="656" font-size="11.5" fill="#5A6B60">· val_accuracy máxima: 96.4 %</text>

  <line x1="310" y1="612" x2="334" y2="612" stroke="#22312A" stroke-width="1.8" marker-end="url(#ma)"/>

  <!-- Card 2: Fine-tuning -->
  <rect x="340" y="520" width="270" height="185" rx="10" fill="#F6FAF7" stroke="#C7D4CB" stroke-width="1.4"/>
  <circle cx="380" cy="560" r="20" fill="#FFFFFF" stroke="#DCE7DF"/>
  <g transform="translate(369,549)" stroke="#1F6B3B" stroke-width="1.7" fill="none" stroke-linecap="round">
    <path d="M11 13l4-4"/>
    <path d="M3.1 17.5a9 9 0 1 1 15.8 0"/>
  </g>
  <text x="412" y="556" font-size="13" font-weight="700" fill="#22312A">Fase 2 — Fine-tuning</text>
  <text x="412" y="574" font-size="11.5" fill="#5A6B60">ajuste fino de la base</text>
  <text x="364" y="612" font-size="11.5" fill="#5A6B60">· descongela desde la capa 100</text>
  <text x="364" y="634" font-size="11.5" fill="#5A6B60">· Adam, lr 1×10⁻⁵ · hasta 15 épocas</text>
  <text x="364" y="656" font-size="11.5" fill="#5A6B60">· restaura los mejores pesos</text>

  <line x1="610" y1="612" x2="634" y2="612" stroke="#22312A" stroke-width="1.8" marker-end="url(#ma)"/>

  <!-- Card 3: TFLite -->
  <rect x="640" y="520" width="270" height="185" rx="10" fill="#F6FAF7" stroke="#C7D4CB" stroke-width="1.4"/>
  <circle cx="680" cy="560" r="20" fill="#FFFFFF" stroke="#DCE7DF"/>
  <g transform="translate(669,549)" stroke="#1F6B3B" stroke-width="1.7" fill="none" stroke-linecap="round">
    <rect x="5" y="5" width="12" height="12" rx="2"/>
    <rect x="8.5" y="8.5" width="5" height="5" rx="1"/>
    <line x1="8" y1="1.5" x2="8" y2="5"/><line x1="14" y1="1.5" x2="14" y2="5"/>
    <line x1="8" y1="17" x2="8" y2="20.5"/><line x1="14" y1="17" x2="14" y2="20.5"/>
    <line x1="1.5" y1="8" x2="5" y2="8"/><line x1="1.5" y1="14" x2="5" y2="14"/>
    <line x1="17" y1="8" x2="20.5" y2="8"/><line x1="17" y1="14" x2="20.5" y2="14"/>
  </g>
  <text x="712" y="556" font-size="13" font-weight="700" fill="#22312A">Exportación TFLite</text>
  <text x="712" y="574" font-size="11.5" fill="#5A6B60">cuantización dinámica</text>
  <text x="664" y="612" font-size="11.5" fill="#5A6B60">· tf.lite.Optimize.DEFAULT</text>
  <text x="664" y="634" font-size="11.5" fill="#5A6B60">· 11.63 MB (Keras) → 3.16 MB</text>
  <text x="664" y="656" font-size="11.5" fill="#5A6B60">· exactitud test: 96.23 % → 96.01 %</text>

  <line x1="910" y1="612" x2="934" y2="612" stroke="#22312A" stroke-width="1.8" marker-end="url(#ma)"/>

  <!-- Card 4: Despliegue -->
  <rect x="940" y="520" width="270" height="185" rx="10" fill="#F6FAF7" stroke="#C7D4CB" stroke-width="1.4"/>
  <circle cx="980" cy="560" r="20" fill="#FFFFFF" stroke="#DCE7DF"/>
  <g transform="translate(969,549)" stroke="#1F6B3B" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="6" y="1.5" width="10" height="19" rx="2"/>
    <line x1="10" y1="17.5" x2="12" y2="17.5"/>
  </g>
  <text x="1012" y="556" font-size="13" font-weight="700" fill="#22312A">Despliegue on-device</text>
  <text x="1012" y="574" font-size="11.5" fill="#5A6B60">app Flutter (Avocado IA)</text>
  <text x="964" y="612" font-size="11.5" fill="#5A6B60">· tflite_flutter (LiteRT) · Android</text>
  <text x="964" y="634" font-size="11.5" fill="#5A6B60">· inferencia local, sin internet</text>
  <text x="964" y="656" font-size="11.5" fill="#5A6B60">· verificado en Pixel 8: 96.7 % (30 img)</text>
